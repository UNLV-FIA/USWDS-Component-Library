<label class="usa-label" [attr.for]="inputId()">{{ label() }}</label>
@if (hint()) {
  <span class="usa-hint" [id]="hintId()">{{ hint() }}</span>
}
<!-- Single line text input -->
@if (type() == 'text') {
  <input
    class="usa-input"
    [ngClass]="inputClasses()"
    [id]="inputId()"
    [name]="inputId()"
    [required]="required()"
    [disabled]="disabled()"
    [attr.aria-disabled]="ariaDisabled()"
    [attr.aria-describedby]="describedBy()"
    [attr.maxlength]="maxLen()"
  />
}
<!-- Multi-line text input -->
@if (type() == 'textarea') {
  <textarea
    class="usa-textarea"
    [ngClass]="inputClasses()"
    [id]="inputId()"
    [name]="inputId()"
    [required]="required()"
    [disabled]="disabled()"
    [attr.aria-disabled]="ariaDisabled()"
    [attr.aria-describedby]="describedBy()"
    [attr.maxlength]="maxLen()"
  ></textarea>
}

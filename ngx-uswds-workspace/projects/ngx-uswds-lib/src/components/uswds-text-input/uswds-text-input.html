<label class="usa-label" [attr.for]="inputId()">{{ label() }}</label>
<!-- Single line text input -->
@if (type() == 'text') {
  <input
    class="usa-input"
    [ngClass]="inputClasses()"
    [id]="inputId()"
    [name]="inputId()"
    [required]="required()"
    [disabled]="disabled()"
    [attr.aria-disabled]="disabled()"
  />
}

<!-- Multi-line text input -->
@if (type() == 'textarea') {
  <textarea
    class="usa-textarea"
    [ngClass]="inputClasses()"
    [id]="inputId()"
    [name]="inputId()"
    [required]="required()"
    [disabled]="disabled()"
    [attr.aria-disabled]="disabled()"
  ></textarea>
}
